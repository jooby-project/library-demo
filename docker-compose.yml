services:
  db:
    image: mysql:8
    container_name: library-mysql
    restart: always
    environment:
      # Root password for admin tasks
      MYSQL_ROOT_PASSWORD: rootpassword

      # Creates this database on startup (empty)
      MYSQL_DATABASE: library

      # Creates a specific user with full access to the 'library' database
      MYSQL_USER: library_admin
      MYSQL_PASSWORD: secure_library_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: